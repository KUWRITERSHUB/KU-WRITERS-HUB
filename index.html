<script>
async function pay(){
  let phone = document.getElementById("phone").value;

  if(!phone){
    alert("Enter phone number");
    return;
  }

  await fetch("https://YOUR-GLITCH-LINK/pay", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ phone })
  });

  alert("Payment request sent! Check your phone soon.");
}
</script>
