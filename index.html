<button onclick="pay()" style="padding:10px 20px; background:green; color:white; border:none; border-radius:10px;">
  Pay KES 500 via M-PESA
</button>

<script>
function pay() {
  const phone = prompt("Enter your phone number (2547XXXXXXXX)");

  if (!phone) {
    alert("Phone number required!");
    return;
  }

  alert("Payment request received for " + phone + ".\n\nNOTE: M-PESA integration coming next.");
}
</script>
