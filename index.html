<script>

let user = JSON.parse(localStorage.getItem("user")) || null;

function hideAll(){
  ["home","register","login","payment","dashboard"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

// REGISTER
function register(){
  user = {
    name: regName.value,
    email: regEmail.value,
    pass: regPass.value,
    balance: 0,
    profits: 0,
    referrals: 0
  };

  localStorage.setItem("user", JSON.stringify(user));
  alert("Registered!");
  showLogin();
}

// LOGIN
function login(){
  let saved = JSON.parse(localStorage.getItem("user"));

  if(saved && logEmail.value === saved.email && logPass.value === saved.pass){
    user = saved;
    loadDashboard();
  } else {
    alert("Wrong login");
  }
}

// PAYMENT
function pay(){
  user.balance = 600;
  saveUser();
  alert("Payment Successful!");
  loadDashboard();
}

// LOAD DASHBOARD
function loadDashboard(){
  hideAll();
  dashboard.style.display="block";

  document.getElementById("welcome").innerText = "Welcome, " + user.name;

  updateWallet();
}

// UPDATE VALUES (THIS FIXES BLANK ISSUE)
function updateWallet(){
  document.getElementById("balance").innerText = user.balance;
  document.getElementById("profits").innerText = user.profits;
  document.getElementById("referrals").innerText = user.referrals;
}

// EARNINGS
function earnJob(){
  user.profits += 150;
  saveUser();
  updateWallet();
}

function earnBlog(){
  user.profits += 100;
  saveUser();
  updateWallet();
}

function earnSurvey(){
  user.profits += 10;
  saveUser();
  updateWallet();
}

// REFERRAL
function addReferral(){
  user.referrals += 200;
  user.balance += 200;
  saveUser();
  updateWallet();
}

// WITHDRAW
function withdraw(){
  if(user.referrals <= 0){
    alert("No referral earnings");
    return;
  }

  alert("Withdrawn: KES " + user.referrals);
  user.referrals = 0;
  saveUser();
  updateWallet();
}

// BUY BOT
function buyBot(){
  if(user.balance < 15000){
    alert("Insufficient balance");
  } else {
    user.balance -= 15000;
    alert("AI Bot Activated!");
    saveUser();
    updateWallet();
  }
}

// SAVE
function saveUser(){
  localStorage.setItem("user", JSON.stringify(user));
}

</script>
