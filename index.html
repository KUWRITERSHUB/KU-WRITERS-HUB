<script>
function pay(){
  let phone = document.getElementById("phone").value;

  if(!phone){
    alert("Enter phone number");
    return;
  }

  // Show processing
  alert("Processing payment for " + phone + "...");

  // Simulate delay like M-PESA
  setTimeout(() => {
    alert("STK Push Sent!\nCheck your phone and enter PIN.");

    // Simulate success
    setTimeout(() => {
      alert("Payment Successful ✅");

      // Activate dashboard
      document.getElementById("payment").style.display="none";
      document.getElementById("dashboard").style.display="block";

    }, 3000);

  }, 2000);
}
</script>
