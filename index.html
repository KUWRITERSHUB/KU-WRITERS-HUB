<!DOCTYPE html>
<html>
<head>
  <title>UK WRITERS HUB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .header {
      background:#111827;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo {
      font-weight:bold;
      font-size:18px;
      color:#22c55e;
    }

    .container {
      padding:15px;
    }

    .card {
      background:#1f2937;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .balance {
      background:linear-gradient(45deg,#22c55e,#16a34a);
      padding:20px;
      border-radius:12px;
      margin-bottom:15px;
    }
    <button onclick="activate()">Activate Account (KES 500)</button>

    .features {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .box {
      padding:15px;
      border-radius:10px;
      text-align:center;
      font-weight:bold;
      cursor:pointer;
    }

    .red {background:#ef4444;}
    .blue {background:#3b82f6;}
    .purple {background:#8b5cf6;}
    .pink {background:#ec4899;}
    .green {background:#22c55e;}
    .orange {background:#f97316;}
    .maroon {background:#7f1d1d;}
    .teal {background:#14b8a6;}

    button {
      padding:10px;
      width:100%;
      border:none;
      border-radius:8px;
      margin-top:10px;
      background:#22c55e;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">UK WRITERS HUB</div>
</div>

<div class="container">

  <div class="balance">
    <h2>KES <span id="balance">600</span></h2>
    <p>Main Balance</p>
  </div>

  <div class="card">
    <p>Profits: KES <span id="profits">0</span></p>
    <p>Referral Earnings: KES <span id="referrals">0</span></p>
    <p>Total Withdrawals: KES <span id="withdrawals">0</span></p>

    <button onclick="convert()">Convert Profits to Balance</button>
  </div>
<div class="card">
  <p>Your Referral Link:</p>
  <input id="refLink" readonly style="width:100%; padding:10px; border-radius:8px;">
  </div>
  
  <h3>Features</h3>

  <div class="features">

    <div class="box red" onclick="earn(150)">Academic Writing</div>
    <div class="box blue" onclick="earn(100)">Blog Writing</div>
    <div class="box purple" onclick="earn(120)">Article Writing</div>
    <div class="box pink" onclick="earn(10)">Surveys</div>

    <div class="box green" onclick="referral()">Affiliate Program</div>
    <div class="box orange" onclick="earn(200)">E-commerce</div>

    <div class="box teal" onclick="alert('https://chat.whatsapp.com/J5ADgIBZ7x05toVKpjRjou?mode=gi_t')">WhatsApp Group</div>

    <div class="box maroon" onclick="buyBot()">AI Trading Bot (KES 15,000)</div>

    <div class="box blue" onclick="alert('Training sessions coming')">Training</div>
    <div class="box red" onclick="earn(80)">Daily Tasks</div>

  </div>

  <button onclick="withdraw()">Withdraw (Min KES 600)</button>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user")) || {
  balance:600,
  profits:0,
  referrals:0,
  withdrawals:0
};
let user = JSON.parse(localStorage.getItem("user")) || {
  balance: 0,
  profits: 0,
  referrals: 0,
  withdrawals: 0,
  activated: false
};
function update(){
  balance.innerText = user.balance;
  profits.innerText = user.profits;
  referrals.innerText = user.referrals;
  withdrawals.innerText = user.withdrawals;
}

function save(){
  localStorage.setItem("user", JSON.stringify(user));
  update();
}

// EARNING
function earn(amount){

  function earn(amount){

  if(!user.activated){
    alert("Activate your account first (KES 500)");
    return;
  }
  user.profits += amount;
  save();
}

// REFERRAL
function referral(){
  user.referrals += 150;
  user.balance += 150;
  save();
}

// WITHDRAW
function withdraw(){
  if(user.balance < 600){
    alert("Minimum withdrawal is KES 600");
    return;
  }

  user.withdrawals += user.balance;
  user.balance = 0;
  save();

  alert("Withdrawal successful");
}

// AI BOT
function buyBot(){
  if(user.balance < 15000){
    alert("Insufficient balance");
  } else {
    user.balance -= 15000;
    save();
    alert("AI Trading Bot Activated!");
  }
}

update();

</scriptfunction convert(){
  if(user.profits <= 0){
    alert("No profits to convert");
    return;
  }

  user.balance += user.profits;
  user.profits = 0;

  save();

  alert("Converted to balance");
}>

</body>
</html>
