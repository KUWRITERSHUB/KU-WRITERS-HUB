<!DOCTYPE html>
<html>
<head>
  <title>UK WRITERS HUB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f4f6f9; margin:0;">

<!-- NAVBAR -->
<div style="background:black; color:white; padding:15px; display:flex; justify-content:space-between;">
  <b>UK WRITERS HUB</b>
  <div>
    <button onclick="showLogin()">Login</button>
    <button onclick="showRegister()">Register</button>
  </div>
</div>

<!-- HOME -->
<div id="home" style="padding:20px; text-align:center;">
  <h2>Earn, Write, and Grow</h2>
  <p>Join Kenya’s fastest growing academic writing platform</p>
  <button onclick="showPayment()" style="padding:10px; background:green; color:white;">Join Now (KES 500)</button>
</div>

<!-- REGISTER -->
<div id="register" style="display:none; padding:20px;">
  <h3>Register</h3>
  <input placeholder="Name"><br><br>
  <input placeholder="Email"><br><br>
  <input placeholder="Phone"><br><br>
  <input type="password" placeholder="Password"><br><br>
  <button onclick="alert('Registered successfully')">Submit</button>
</div>

<!-- LOGIN -->
<div id="login" style="display:none; padding:20px;">
  <h3>Login</h3>
  <input placeholder="Email"><br><br>
  <input type="password" placeholder="Password"><br><br>
  <button onclick="showDashboard()">Login</button>
</div>

<!-- PAYMENT -->
<div id="payment" style="display:none; padding:20px;">
  <h3>Activate Account</h3>
  <input id="phone" placeholder="2547XXXXXXXX"><br><br>
  <button onclick="pay()" style="background:green; color:white;">Pay KES 500</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none; padding:20px;">
  <h2>Dashboard</h2>

  <p><b>Wallet:</b> KES 0</p>

  <p><b>Your Referral Link:</b></p>
  <input value="https://ukwritershub.vercel.app/?ref=123" style="width:100%">

  <h3>Available Jobs</h3>
  <ul>
    <li>Essay Writing - KES 1500 <button>Bid</button></li>
    <li>Research Paper - KES 3000 <button>Bid</button></li>
  </ul>

  <h3>Blog Writing</h3>
  <button onclick="alert('Submit blog feature coming soon')">Write Blog (Earn KES 100)</button>
</div>

<!-- SCRIPT -->
<script>
function hideAll(){
  document.getElementById("home").style.display="none";
  document.getElementById("register").style.display="none";
  document.getElementById("login").style.display="none";
  document.getElementById("payment").style.display="none";
  document.getElementById("dashboard").style.display="none";
}

function showRegister(){ hideAll(); document.getElementById("register").style.display="block"; }
function showLogin(){ hideAll(); document.getElementById("login").style.display="block"; }
function showPayment(){ hideAll(); document.getElementById("payment").style.display="block"; }
function showDashboard(){ hideAll(); document.getElementById("dashboard").style.display="block"; }

function pay(){
  let phone = document.getElementById("phone").value;
  if(!phone){
    alert("Enter phone number");
    return;
  }
  alert("Payment request for "+phone+" received.\nSTK Push coming next.");
}
</script>

</body>
</html>
